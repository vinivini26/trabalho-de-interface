<section class="container py-5">

<h1 class="text-center mb-5">

Envie sua Avaliação

</h1>

<form class="row g-3">

<div class="col-md-6">

<label class="form-label">

Nome

</label>

<input
type="text"
class="form-control"
required>

</div>

<div class="col-md-6">

<label class="form-label">

Email

</label>

<input
type="email"
class="form-control"
required>

</div>

<div class="col-12">

<label class="form-label">

Restaurante

</label>

<input
type="text"
class="form-control">

</div>

<div class="col-md-6">

<label class="form-label">

Nota

</label>

<select class="form-select">

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>

</select>

</div>

<div class="col-12">

<label class="form-label">

Comentário

</label>

<textarea
rows="5"
class="form-control"></textarea>

</div>

<div class="col-12">

<button
type="submit"
class="btn btn-warning">

Enviar Avaliação

</button>

</div>

</form>

</section>

<section class="container py-5">

<h2 class="text-center mb-4">

Perguntas Frequentes

</h2>

<div class="accordion">

<div class="accordion-item">

<h2 class="accordion-header">

<button
class="accordion-button"
data-bs-toggle="collapse"
data-bs-target="#pergunta1">

Quem pode avaliar?

</button>

</h2>

<div
id="pergunta1"
class="accordion-collapse collapse show">

<div class="accordion-body">

Qualquer visitante pode compartilhar
sua experiência gastronômica.

</div>

</div>

</div>

<div class="accordion-item">

<h2 class="accordion-header">

<button
class="accordion-button collapsed"
data-bs-toggle="collapse"
data-bs-target="#pergunta2">

As avaliações são moderadas?

</button>

</h2>

<div
id="pergunta2"
class="accordion-collapse collapse">

<div class="accordion-body">

Sim. Todas as avaliações passam por análise.

</div>

</div>

</div>

</div>
